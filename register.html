<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Glamstocks Register</title>
    <link rel="stylesheet" href="register.css">
</head>

<body>

    <!-- LOGO (CENTERED LIKE HOMEPAGE) -->
    <header>
        <h1 class="main-logo">GLAMSTOCKS</h1>
    </header>

    <!-- PURPLE NAV BAR -->
    <nav class="nav-bar">
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="orders.html">Orders</a></li>
            <li><a href="delivery.html">Delivery</a></li>
            <li><a href="inventory.html">Inventory</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="brands we carry.html">Brands We Carry</a></li>
            <li><a href="register.html">Register</a></li>
        </ul>
    </nav>

    <!-- REGISTER SECTION -->
    <div class="register-container">

        <h2>Create Account</h2>
        <p>Join Glamstocks — Beauty logistics made easy ✨</p>

        <form>

            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>

            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Password</label>
            <input type="password" placeholder="Create password" required>

            <label>Business Type</label>
            <select>
                <option>Select your role</option>
                <option>Makeup Artist</option>
                <option>Store Manager</option>
                <option>Store Owner</option>
            </select>

            <button type="submit">Register</button>

        </form>

        <p class="login-link">
            Already have an account? <a href="#">Login</a>
        </p>

    </div>

</body>
</html>
